<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>complex form </title>
</head>
<body>

    <fieldset>
        <legend> Personal Information</legend>
        <label for="name"> Name</label>
        <input type="text" name="name" id="name" placeholder="enter your name here">
<br><br>
        <label for="email"> email</label>       
        <input type="email" name="email" id="email" placeholder="enter your email here">
<br><br>
        <label for="number"> phone number</label>
        <input type="tel" name="number" id="number" placeholder="enter your phone number here">
<br><br>
        <label for="date"> date of birth</label>
        <input type="date" name="date" id="date">
<br><br>
        <label for="gender"> Gender </label>
        <input type="radio" name="gender" id="gender" >male

         <label for="gender"> </label>
        <input type="radio" name="gender" id="gender" >Female

         <label for="gender">  </label>
        <input type="radio" name="gender" id="gender" >others
        <br><br>

        <label for="country"> Country</label>
       <select name="country" id="country">
           <option>India</option>
           <option>USA</option>
           <option>UK</option>
           <option>Australia</option>
           </select>
       






    </fieldset>


    <fieldset>
        <legend>Address Street </legend>
        <label for="street"> Street</label>
        <input type="text" name="street" id="street" placeholder="enter your steet here">
<br><br>
        <label for="city"> city</label>
        <input type="text" name="city" id="city" placeholder="enter your city here">
<br><br>
        <label for="state"> state</label>
        <input type="text" name="state" id="state" placeholder="enter your state here">
<br><br>
        <label for="zip"> zip code</label>
        <input type="text" name="zip" id="zip" placeholder="enter your zip code here">




    </fieldset>

    <fieldset>



        <legend> Other information</legend>
        <label for="comments"> Comments</label>
        <textarea name="comments" id="comments" rows="4" cols="30" placeholder="enter your comments here"></textarea>
<br>
<label for="terms"> I agree to the terms and conditions</label>
<input type="checkbox" name="terms" id="terms">
    </fieldset>

    <input type="submit" value="Submit ">
    
</body>
</html>
